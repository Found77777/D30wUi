name: React WebView Android Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-webview-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build React/Vite
        run: npm run build

      - name: Copy dist to Android assets/webapp
        run: |
          rm -rf android-webview-app/app/src/main/assets/webapp
          mkdir -p android-webview-app/app/src/main/assets/webapp
          cp -R dist/. android-webview-app/app/src/main/assets/webapp/
          test -f android-webview-app/app/src/main/assets/webapp/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Gradle tasks
        run: gradle -p android-webview-app tasks --no-daemon

      - name: Assemble debug APK
        run: gradle -p android-webview-app assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: d30wui-webview-debug-apk
          path: android-webview-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
